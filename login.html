<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · Project Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css?v=8">
<link rel="stylesheet" href="assets/css/auth.css?v=8">
</head>
<body class="auth-body">
<form class="auth-card" id="login-form">
    <div class="auth-brand">
        <div class="brand-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 21V8l9-5 9 5v13"/><path d="M9 21v-7h6v7"/><path d="M3 10h4M17 10h4M3 15h4M17 15h4"/>
            </svg>
        </div>
        <div>
            <div class="brand-name">Project Manager</div>
            <div class="brand-sub">sign in to continue</div>
        </div>
    </div>
    <h1>Welcome back</h1>
    <p class="sub">Use your work email to sign in.</p>

    <div id="err" class="auth-err" style="display:none"></div>

    <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" required>
    </div>
    <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>

    <button class="btn btn-primary" type="submit" id="submit">Sign in</button>

    <div class="auth-foot">
        <span id="register-hint">Ask your admin for an account, or <a href="register.html">create one if allowed</a>.</span>
    </div>
</form>

<script src="assets/js/api.js?v=8"></script>
<script>
(async () => {
    // Already signed in? bounce.
    try {
        const r = await API.me();
        if (r.user) { location.replace('index.html'); return; }
        const hint = document.getElementById('register-hint');
        if (hint) {
            hint.textContent = r.allow_public_register
                ? ''
                : 'Ask your admin for an account — public registration is disabled.';
            if (r.allow_public_register) {
                hint.innerHTML = 'No account? <a href="register.html">Create one</a>.';
            }
        }
    } catch {}
})();

const form = document.getElementById('login-form');
const err  = document.getElementById('err');
const btn  = document.getElementById('submit');
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
        await API.login(form.email.value.trim(), form.password.value);
        location.replace('index.html');
    } catch (ex) {
        err.textContent = ex.message || 'Login failed';
        err.style.display = '';
        btn.disabled = false;
        btn.textContent = 'Sign in';
    }
});
</script>
</body>
</html>
