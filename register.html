<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register · Project Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css?v=10">
<link rel="stylesheet" href="assets/css/auth.css?v=10">
</head>
<body class="auth-body">
<form class="auth-card" id="reg-form">
    <div class="auth-brand">
        <div class="brand-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 21V8l9-5 9 5v13"/><path d="M9 21v-7h6v7"/><path d="M3 10h4M17 10h4M3 15h4M17 15h4"/>
            </svg>
        </div>
        <div>
            <div class="brand-name">Project Manager</div>
            <div class="brand-sub">create account</div>
        </div>
    </div>
    <h1>Create your account</h1>
    <p class="sub">This only works if your admin enabled public registration in <code>api/config.php</code>.</p>

    <div id="err" class="auth-err" style="display:none"></div>

    <div class="field"><label for="name">Full name</label><input id="name" name="name" type="text" required></div>
    <div class="field"><label for="role">Role (optional)</label><input id="role" name="role" type="text" placeholder="e.g. Field Tech"></div>
    <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" autocomplete="username" required></div>
    <div class="field"><label for="password">Password</label><input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required></div>

    <button class="btn btn-primary" type="submit" id="submit">Create account</button>
    <div class="auth-foot">Already have an account? <a href="login.html">Sign in</a></div>
</form>

<script src="assets/js/api.js?v=10"></script>
<script>
const form = document.getElementById('reg-form');
const err  = document.getElementById('err');
const btn  = document.getElementById('submit');
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
        await API.register({
            name: form.name.value.trim(),
            role: form.role.value.trim(),
            email: form.email.value.trim(),
            password: form.password.value,
        });
        location.replace('index.html');
    } catch (ex) {
        err.textContent = ex.message || 'Registration failed';
        err.style.display = '';
        btn.disabled = false;
        btn.textContent = 'Create account';
    }
});
</script>
</body>
</html>
