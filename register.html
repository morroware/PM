<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register · Castle Tech Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css?v=11">
<link rel="stylesheet" href="assets/css/auth.css?v=11">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body class="auth-body">
<form class="auth-card" id="reg-form">
    <div class="auth-brand">
        <div class="brand-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 21V8l9-5 9 5v13"/><path d="M9 21v-7h6v7"/><path d="M3 10h4M17 10h4M3 15h4M17 15h4"/>
            </svg>
        </div>
        <div>
            <div class="brand-name">Castle Tech Tasks</div>
            <div class="brand-sub">create account</div>
        </div>
    </div>
    <h1>Create your account</h1>
    <p class="sub">This only works if your admin enabled public registration in <code>api/config.php</code>.</p>

    <div id="err" class="auth-err" style="display:none" role="alert" aria-live="polite"></div>

    <div class="field"><label for="name">Full name</label><input id="name" name="name" type="text" required></div>
    <div class="field"><label for="role">Role (optional)</label><input id="role" name="role" type="text" placeholder="e.g. Field Tech"></div>
    <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" autocomplete="username" required></div>
    <div class="field">
        <label for="password">Password</label>
        <div class="field-row">
            <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
            <button type="button" class="toggle-pass" id="toggle-password" aria-label="Show password">Show</button>
        </div>
    </div>

    <button class="btn btn-primary" type="submit" id="submit">Create account</button>
    <div class="auth-foot">Already have an account? <a href="login.html">Sign in</a></div>
</form>

<script src="assets/js/api.js?v=11"></script>
<script>
async function gateRegister() {
    try {
        const r = await API.me();
        if (r.user) { return; } // signed-in admins can use this to create users
        if (!r.allow_public_register) {
            document.getElementById('err').textContent =
                'Registration is disabled. Ask a Castle Tech admin to create your account.';
            document.getElementById('err').style.display = '';
            for (const el of form.querySelectorAll('input, button')) el.disabled = true;
        }
    } catch (_) {
        // If the me endpoint fails, preserve current behavior and let submit
        // surface the API-side error message.
    }
}

const form = document.getElementById('reg-form');
const err  = document.getElementById('err');
const btn  = document.getElementById('submit');
const pass = document.getElementById('password');
const passToggle = document.getElementById('toggle-password');
passToggle?.addEventListener('click', () => {
    const showing = pass.type === 'text';
    pass.type = showing ? 'password' : 'text';
    passToggle.textContent = showing ? 'Show' : 'Hide';
    passToggle.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
});
gateRegister();
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
        await API.register({
            name: form.name.value.trim(),
            role: form.role.value.trim(),
            email: form.email.value.trim(),
            password: form.password.value,
        });
        location.replace('index.html');
    } catch (ex) {
        err.textContent = ex.message || 'Registration failed';
        err.style.display = '';
        btn.disabled = false;
        btn.textContent = 'Create account';
    }
});
</script>
</body>
</html>
