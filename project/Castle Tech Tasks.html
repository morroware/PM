<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Castle Tech Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ---------- TOKENS ---------- */
:root{
  /* surfaces, warm-cool neutral with slight blue tilt */
  --bg-0: #0B0F17;        /* app background */
  --bg-1: #10151F;        /* sidebar */
  --bg-2: #151B27;        /* panels */
  --bg-3: #1B2230;        /* cards */
  --bg-4: #232B3C;        /* hover */
  --bg-5: #2D3649;        /* pressed / strong hover */
  --line: #222B3B;
  --line-2: #2B354A;

  --fg-0: #E8ECF4;
  --fg-1: #C6CDDC;
  --fg-2: #8A94A8;
  --fg-3: #5D6679;
  --fg-4: #434B5C;

  /* accent (blue) */
  --acc-0: #3B82F6;
  --acc-1: #60A5FA;
  --acc-2: #1E40AF;
  --acc-soft: rgba(59,130,246,0.12);
  --acc-border: rgba(59,130,246,0.35);

  /* statuses */
  --green: #22C55E;
  --green-soft: rgba(34,197,94,0.14);
  --amber: #F59E0B;
  --amber-soft: rgba(245,158,11,0.14);
  --red: #EF4444;
  --red-soft: rgba(239,68,68,0.14);
  --violet: #A855F7;
  --violet-soft: rgba(168,85,247,0.14);
  --cyan: #06B6D4;
  --cyan-soft: rgba(6,182,212,0.14);
  --pink: #EC4899;
  --pink-soft: rgba(236,72,153,0.14);

  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;

  --shadow-1: 0 1px 0 rgba(255,255,255,0.03) inset, 0 1px 2px rgba(0,0,0,0.4);
  --shadow-2: 0 8px 24px rgba(0,0,0,0.35), 0 2px 6px rgba(0,0,0,0.25);
  --shadow-pop: 0 16px 40px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.4);

  --font-sans: 'Inter', -apple-system, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin:0; padding:0; background: var(--bg-0); color: var(--fg-0); font-family: var(--font-sans); font-size: 14px; line-height: 1.4; -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; overflow: hidden; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
input, textarea { font: inherit; color: inherit; }
::selection { background: var(--acc-soft); color: var(--fg-0); }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--bg-5); background-clip: padding-box; border: 2px solid transparent; }

/* ---------- LAYOUT ---------- */
.app { display: grid; grid-template-columns: 248px 1fr; height: 100vh; width: 100vw; }

/* SIDEBAR */
.sidebar { background: var(--bg-1); border-right: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0; }
.brand { display: flex; align-items: center; gap: 10px; padding: 18px 16px 16px; }
.brand-mark {
  width: 28px; height: 28px; border-radius: 7px;
  background: linear-gradient(135deg, #3B82F6 0%, #1E40AF 100%);
  display: grid; place-items: center; color: white;
  box-shadow: 0 4px 12px rgba(59,130,246,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
  position: relative;
}
.brand-mark svg { width: 16px; height: 16px; }
.brand-name { font-weight: 700; letter-spacing: -0.01em; font-size: 14.5px; }
.brand-sub { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); margin-top: 1px; letter-spacing: 0.02em; }

.workspace-switcher {
  margin: 4px 10px 10px; padding: 8px 10px; border-radius: 8px;
  display: flex; align-items: center; gap: 10px; cursor: pointer;
  border: 1px solid transparent;
}
.workspace-switcher:hover { background: var(--bg-2); border-color: var(--line-2); }
.ws-avatar { width: 24px; height: 24px; border-radius: 6px; background: linear-gradient(135deg, #64748B, #334155); display:grid; place-items:center; font-weight:600; font-size: 11px; color: white; }
.ws-name { font-size: 13px; font-weight: 500; flex: 1; }
.ws-chev { color: var(--fg-3); }

.nav-section { padding: 4px 10px; }
.nav-label { font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); padding: 10px 10px 6px; font-weight: 600; display:flex; align-items:center; justify-content:space-between; }
.nav-label .add { opacity: 0; transition: opacity 0.15s; color: var(--fg-2); width: 16px; height: 16px; display:grid; place-items:center; border-radius: 4px; cursor: pointer; }
.nav-section:hover .add { opacity: 1; }
.nav-label .add:hover { background: var(--bg-3); color: var(--fg-0); }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: 7px; color: var(--fg-1);
  font-size: 13px; cursor: pointer; user-select: none;
  position: relative;
}
.nav-item:hover { background: var(--bg-2); color: var(--fg-0); }
.nav-item.active { background: var(--acc-soft); color: var(--fg-0); }
.nav-item.active::before {
  content:''; position: absolute; left: -10px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 18px; background: var(--acc-0); border-radius: 0 3px 3px 0;
}
.nav-item .icon { width: 16px; height: 16px; color: var(--fg-2); flex-shrink: 0; }
.nav-item.active .icon { color: var(--acc-1); }
.nav-item .count { margin-left: auto; font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
.nav-item .dot { width:8px; height: 8px; border-radius: 50%; margin-left: auto; }

.nav-proj { display: flex; align-items: center; gap: 10px; padding: 6px 10px; border-radius: 7px; color: var(--fg-1); font-size: 13px; cursor: pointer; }
.nav-proj:hover { background: var(--bg-2); color: var(--fg-0); }
.nav-proj .proj-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.nav-proj .proj-name { flex:1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-proj .proj-count { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }

.sidebar-scroll { overflow-y: auto; flex: 1; padding-bottom: 8px; }

.sidebar-footer { padding: 10px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
.avatar { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; font-size: 11px; font-weight: 600; color: white; flex-shrink: 0; background-size: cover; background-position: center; }
.me { font-size: 12.5px; font-weight: 500; }
.me-role { font-size: 11px; color: var(--fg-3); }

/* MAIN */
.main { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
.topbar {
  height: 52px; border-bottom: 1px solid var(--line); padding: 0 20px;
  display: flex; align-items: center; gap: 14px; background: var(--bg-0);
}
.crumbs { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--fg-2); }
.crumbs .sep { color: var(--fg-4); }
.crumbs .cur { color: var(--fg-0); font-weight: 600; }

.search {
  margin-left: auto; display: flex; align-items: center; gap: 8px;
  background: var(--bg-2); border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; width: 280px; transition: all 0.15s;
}
.search:focus-within { border-color: var(--acc-border); background: var(--bg-3); box-shadow: 0 0 0 3px var(--acc-soft); }
.search input { flex:1; background: none; border: 0; outline: none; font-size: 13px; color: var(--fg-0); }
.search input::placeholder { color: var(--fg-3); }
.search .kbd { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); background: var(--bg-3); border: 1px solid var(--line-2); padding: 1px 5px; border-radius: 4px; }
.search:focus-within .kbd { display: none; }

.icon-btn { width: 32px; height: 32px; border-radius: 7px; display: grid; place-items: center; color: var(--fg-2); }
.icon-btn:hover { background: var(--bg-2); color: var(--fg-0); }
.icon-btn .icon { width: 16px; height: 16px; }
.icon-btn .notif-dot { position: absolute; }

.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
  border-radius: 7px; font-size: 13px; font-weight: 500;
  transition: all 0.12s; border: 1px solid transparent;
}
.btn-primary { background: var(--acc-0); color: white; box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 2px 4px rgba(59,130,246,0.2); }
.btn-primary:hover { background: var(--acc-1); transform: translateY(-0.5px); }
.btn-primary:active { transform: translateY(0); }
.btn-ghost { color: var(--fg-1); border-color: var(--line-2); background: var(--bg-2); }
.btn-ghost:hover { background: var(--bg-3); color: var(--fg-0); }
.btn-muted { color: var(--fg-1); background: transparent; }
.btn-muted:hover { background: var(--bg-2); color: var(--fg-0); }

/* View switcher tabs */
.view-tabs { display: flex; gap: 2px; background: var(--bg-2); padding: 3px; border-radius: 8px; border: 1px solid var(--line); }
.view-tab { padding: 5px 11px; border-radius: 6px; font-size: 12.5px; color: var(--fg-2); display: flex; align-items: center; gap: 6px; font-weight: 500; }
.view-tab:hover { color: var(--fg-0); }
.view-tab.active { background: var(--bg-4); color: var(--fg-0); box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
.view-tab .icon { width: 14px; height: 14px; }

/* Filters row */
.filters {
  padding: 12px 20px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--line); flex-shrink: 0;
}

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 500;
  background: var(--bg-3); color: var(--fg-1); border: 1px solid var(--line-2);
  cursor: pointer;
}
.chip:hover { background: var(--bg-4); }
.chip .icon { width: 12px; height: 12px; color: var(--fg-3); }
.chip.active { background: var(--acc-soft); color: var(--acc-1); border-color: var(--acc-border); }
.chip.active .icon { color: var(--acc-1); }

.filter-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 8px; font-size: 12.5px;
  background: var(--bg-2); color: var(--fg-1); border: 1px dashed var(--line-2);
}
.filter-pill:hover { background: var(--bg-3); border-style: solid; }
.filter-pill .icon { width: 12px; height: 12px; }

/* content area */
.content { flex: 1; min-height: 0; overflow: auto; position: relative; }

/* ---------- TAGS / BADGES ---------- */
.tag { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 5px; font-size: 11.5px; font-weight: 500; letter-spacing: 0.01em; }
.tag.green { background: var(--green-soft); color: #86EFAC; }
.tag.amber { background: var(--amber-soft); color: #FCD34D; }
.tag.red { background: var(--red-soft); color: #FCA5A5; }
.tag.violet { background: var(--violet-soft); color: #D8B4FE; }
.tag.cyan { background: var(--cyan-soft); color: #67E8F9; }
.tag.pink { background: var(--pink-soft); color: #F9A8D4; }
.tag.blue { background: var(--acc-soft); color: var(--acc-1); }
.tag.slate { background: var(--bg-4); color: var(--fg-1); }

.prio { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; }
.prio.p0 { color: #FCA5A5; }
.prio.p1 { color: #FCD34D; }
.prio.p2 { color: var(--acc-1); }
.prio.p3 { color: var(--fg-2); }

/* ---------- AVATARS ---------- */
.av-stack { display: flex; }
.av-stack .avatar { width: 22px; height: 22px; font-size: 10px; border: 2px solid var(--bg-3); margin-left: -6px; box-shadow: 0 0 0 0 transparent; }
.av-stack .avatar:first-child { margin-left: 0; }
.av-more { width: 22px; height: 22px; border-radius: 50%; background: var(--bg-4); color: var(--fg-1); display:grid; place-items:center; font-size: 10px; font-weight: 600; border: 2px solid var(--bg-3); margin-left: -6px; }

/* ---------- POPOVER BASE ---------- */
.popover {
  position: absolute; z-index: 100; background: var(--bg-2);
  border: 1px solid var(--line-2); border-radius: 10px;
  box-shadow: var(--shadow-pop); padding: 6px;
  min-width: 220px;
}
.popover-header { font-size: 11px; color: var(--fg-3); letter-spacing: 0.06em; text-transform: uppercase; padding: 8px 10px 6px; font-weight: 600; }
.pop-item { display:flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; cursor:pointer; font-size: 13px; }
.pop-item:hover { background: var(--bg-3); }
.pop-item.selected { background: var(--acc-soft); color: var(--acc-1); }
.pop-item .check { margin-left: auto; opacity: 0; color: var(--acc-1); }
.pop-item.selected .check { opacity: 1; }
.pop-search { padding: 2px; }
.pop-search input { width: 100%; background: var(--bg-3); border: 1px solid var(--line-2); border-radius: 7px; padding: 7px 10px; outline: none; font-size: 13px; }
.pop-search input:focus { border-color: var(--acc-border); box-shadow: 0 0 0 3px var(--acc-soft); }

/* ---------- Animations ---------- */
@keyframes slideInRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes scaleIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 60% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }

.popover { animation: scaleIn 0.12s ease-out; transform-origin: top left; }

/* ---------- misc ---------- */
.spin { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.empty { color: var(--fg-3); font-size: 13px; padding: 40px 20px; text-align: center; }

/* utility */
.hstack { display: flex; align-items: center; gap: 8px; }
.vstack { display: flex; flex-direction: column; gap: 4px; }
.hide { display: none !important; }
.mono { font-family: var(--font-mono); }

</style>
</head>
